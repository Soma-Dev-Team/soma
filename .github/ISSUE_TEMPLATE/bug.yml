name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. Steps to reproduce help a lot.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: iPhone 14 · Safari 17.4 · iOS 17.4
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Confirmation
      options:
        - label: I have not included any personal data (food logs, weights, etc.) in this report.
          required: true
