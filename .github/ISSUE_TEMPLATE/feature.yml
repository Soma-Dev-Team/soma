name: Feature request
description: Suggest a new feature for Soma.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (< 1 day)
        - Medium (1–3 days)
        - Large (a sprint)
        - Unsure
    validations:
      required: true
